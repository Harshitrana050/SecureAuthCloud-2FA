<!DOCTYPE html>
<html>

<head>
    <title>Access Denied</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            height:100vh;

            background:url("{{ url_for('static', filename='images/bg.jpg') }}");

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            color:white;
        }

        .overlay{

            position:fixed;

            width:100%;
            height:100%;

            background:rgba(0,0,0,0.65);

            z-index:-1;
        }

        .header{

            position:absolute;

            top:20px;

            font-size:30px;

            font-weight:bold;

            color:white;

            letter-spacing:1px;

            text-shadow:0 0 15px rgba(255,255,255,0.8);
        }

        .circle{

            position:absolute;

            border-radius:50%;

            background:rgba(255,255,255,0.08);

            animation:float 10s infinite ease-in-out;
        }

        .circle:nth-child(1){

            width:220px;
            height:220px;

            top:10%;
            left:15%;
        }

        .circle:nth-child(2){

            width:320px;
            height:320px;

            bottom:10%;
            right:15%;
        }

        .circle:nth-child(3){

            width:160px;
            height:160px;

            bottom:25%;
            left:10%;
        }

        @keyframes float{

            0%,100%{
                transform:translateY(0);
            }

            50%{
                transform:translateY(-35px);
            }
        }

        .card{

            width:420px;

            padding:40px;

            border-radius:25px;

            backdrop-filter:blur(18px);

            background:rgba(255,255,255,0.12);

            border:1px solid rgba(255,255,255,0.2);

            text-align:center;

            box-shadow:
            0 10px 40px rgba(0,0,0,0.5),
            0 0 20px rgba(255,255,255,0.08);
        }

        .denied-img{

            width:130px;
            height:130px;

            object-fit:contain;

            margin-bottom:20px;

            filter:drop-shadow(0 0 12px rgba(255,255,255,0.4));
        }

        h1{

            font-size:32px;

            margin-bottom:12px;

            color:#f87171;
        }

        p{

            font-size:16px;

            color:#e5e7eb;

            margin-bottom:25px;

            line-height:1.5;
        }

        a{

            display:inline-block;

            padding:12px 25px;

            border-radius:12px;

            background:linear-gradient(135deg,#4f46e5,#7c3aed);

            color:white;

            text-decoration:none;

            font-weight:bold;

            transition:0.3s;
        }

        a:hover{

            transform:translateY(-3px);

            box-shadow:0 5px 15px rgba(0,0,0,0.4);
        }

    </style>

</head>

<body>

<div class="overlay"></div>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>


<div class="card">

    <img src="{{ url_for('static', filename='images/access.png') }}"
         class="denied-img">

    <h1>Access Denied</h1>

    <p>
        You do not have permission to access this page.
        Please login with an authorized administrator account.
    </p>

    <a href="/dashboard">
        Back To Dashboard
    </a>

</div>

</body>
</html>
