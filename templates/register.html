<!DOCTYPE html>
<html>

<head>
    <title>Register</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            height:100vh;

            background:url("{{ url_for('static', filename='images/bg.jpg') }}");

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            color:white;
        }

        .overlay{

            position:fixed;

            width:100%;
            height:100%;

            background:rgba(0,0,0,0.6);

            z-index:-1;
        }

        .logo-header{

            position:absolute;

            top:25px;

            display:flex;

            align-items:center;

            gap:12px;

            padding:12px 25px;

            border-radius:18px;

            backdrop-filter:blur(12px);

            background:rgba(255,255,255,0.12);

            border:1px solid rgba(255,255,255,0.18);

            box-shadow:
            0 5px 20px rgba(0,0,0,0.3),
            0 0 15px rgba(255,255,255,0.08);

            z-index:999;
        }

        .shield{

            font-size:32px;

            filter:drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        .title{

            font-size:28px;

            font-weight:bold;

            color:white;

            letter-spacing:1px;

            text-shadow:0 0 15px rgba(255,255,255,0.5);
        }

        .badge{

            padding:6px 12px;

            border-radius:10px;

            background:linear-gradient(135deg,#4f46e5,#7c3aed);

            color:white;

            font-weight:bold;

            font-size:15px;

            box-shadow:0 0 10px rgba(99,102,241,0.5);
        }

        .circle{

            position:absolute;

            border-radius:50%;

            background:rgba(255,255,255,0.1);

            animation:float 10s infinite ease-in-out;
        }

        .circle:nth-child(1){

            width:200px;
            height:200px;

            top:10%;
            left:20%;
        }

        .circle:nth-child(2){

            width:300px;
            height:300px;

            bottom:10%;
            right:20%;
        }

        .circle:nth-child(3){

            width:150px;
            height:150px;

            bottom:30%;
            left:10%;
        }

        @keyframes float{

            0%,100%{
                transform:translateY(0);
            }

            50%{
                transform:translateY(-40px);
            }
        }

        .card{

            width:360px;

            padding:40px;

            border-radius:20px;

            backdrop-filter:blur(15px);

            background:rgba(255,255,255,0.12);

            border:1px solid rgba(255,255,255,0.2);

            text-align:center;

            box-shadow:0 10px 30px rgba(0,0,0,0.4);
        }

        .register-img{

            width:120px;
            height:120px;

            object-fit:contain;

            margin-bottom:15px;
        }

        h2{

            margin-bottom:20px;
        }

        .input-box{

            position:relative;

            margin:28px 0;
        }

        .input-box input{

            width:100%;

            padding:12px 5px;

            background:transparent;

            border:none;

            border-bottom:2px solid white;

            color:white;

            outline:none;

            font-size:16px;
        }

        .input-box label{

            position:absolute;

            left:5px;

            top:12px;

            transition:0.3s;

            pointer-events:none;

            color:white;
        }

        .input-box input:focus + label,
        .input-box input:valid + label,
        .input-box input:not(:placeholder-shown) + label{

            top:-12px;

            font-size:12px;

            color:#d1fae5;
        }

        button{

            width:100%;

            padding:12px;

            border:none;

            border-radius:10px;

            background:#22c55e;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#15803d;

            transform:translateY(-2px);
        }

        a{

            display:block;

            margin-top:15px;

            text-decoration:none;

            color:#ddd;
        }

        .msg{

            color:#fecaca;

            margin-bottom:10px;
        }

    </style>

</head>

<body>

<div class="overlay"></div>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="logo-header">

    <span class="shield">🛡️</span>

    <span class="title">
        SecureAuthCloud
    </span>

    <span class="badge">
        2FA
    </span>

</div>

<div class="card">

    <img src="{{ url_for('static', filename='images/register.png') }}"
         class="register-img">

    <h2>📝 Create Account</h2>

    {% for msg in get_flashed_messages() %}
        <p class="msg">{{ msg }}</p>
    {% endfor %}

    <form method="POST">

        <div class="input-box">

            <input type="email"
                   name="username"
                   placeholder=" "
                   required>

            <label>Username</label>

        </div>

        <div class="input-box">

            <input type="password"
                   name="password"
                   placeholder=" "
                   minlength="8"
                   required>

            <label>Password</label>

        </div>

        <button type="submit">
            Register
        </button>

    </form>

    <a href="/login">
        Already have an account? Login
    </a>

</div>

</body>
</html>
